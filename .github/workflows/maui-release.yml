name: maui-release (apk + windows-zip)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

env:
  PROJECT: src/ConverterApp/ConverterApp.csproj
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  android_apk:
    name: Android APK (Release, unsigned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install workloads
        run: |
          dotnet workload restore
          dotnet workload install maui-android

      - name: Publish APK
        run: |
          dotnet publish ${{ env.PROJECT }} -c Release -f net9.0-android \
            /p:AndroidPackageFormat=apk \
            /p:AndroidKeyStore=false

      - name: Collect APK into Data/android
        shell: bash
        run: |
          set -e
          mkdir -p Data/android
          find src/ConverterApp/bin/Release -name "*.apk" -print -exec cp {} Data/android/ \;
          ls -la Data/android

      - uses: actions/upload-artifact@v4
        with:
          name: Data-android-apk
          path: Data/android/*.apk

  windows_zip:
    name: Windows ZIP (publish output in Data/)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install workloads
        shell: pwsh
        run: |
          dotnet workload restore
          dotnet workload install maui-windows

      - name: Publish Windows (unpackaged)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Data/windows" | Out-Null

          dotnet publish $env:PROJECT -c Release -f net9.0-windows10.0.19041.0 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -o "Data/windows"

          Get-ChildItem -Recurse "Data/windows" | Select-Object FullName

      - name: Zip Data/windows -> Data/windows.zip
        shell: pwsh
        run: |
          if (Test-Path "Data/windows.zip") { Remove-Item "Data/windows.zip" -Force }
          Compress-Archive -Path "Data/windows/*" -DestinationPath "Data/windows.zip"
          Get-Item "Data/windows.zip" | Format-List *

      - uses: actions/upload-artifact@v4
        with:
          name: Data-windows-zip
          path: Data/windows.zip
