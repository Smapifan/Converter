name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore src/ConverterApp/ConverterApp.csproj -f net9.0-android

      - name: Build Android APK
        run: >
          dotnet publish src/ConverterApp/ConverterApp.csproj
          -f net9.0-android
          -c Release
          -p:AndroidPackageFormats=apk
          -p:AndroidKeyStore=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: converter-android-apk
          path: src/ConverterApp/bin/Release/net9.0-android/publish/*.apk
          if-no-files-found: error
